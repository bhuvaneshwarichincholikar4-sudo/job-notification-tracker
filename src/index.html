<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Job Notification App – Shell</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles/components.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="top-bar__main">
          <div class="top-bar__title-group">
            <div class="top-bar__title">Job Notification App</div>
            <div class="top-bar__progress">Step 1 / 5</div>
          </div>
          <div class="top-bar__right">
            <div class="top-bar__status">
              <span class="status-badge status-badge--not-started">Not Started</span>
            </div>
            <button
              type="button"
              class="top-bar__menu-toggle"
              aria-label="Toggle navigation menu"
              aria-expanded="false"
            >
              <span class="top-bar__menu-toggle-bar"></span>
              <span class="top-bar__menu-toggle-bar"></span>
            </button>
          </div>
        </div>
        <nav class="nav" data-nav>
          <ul class="nav__list">
            <li class="nav__item">
              <a href="/dashboard" data-route="/dashboard" data-nav-link class="nav__link"
                >Dashboard</a
              >
            </li>
            <li class="nav__item">
              <a href="/saved" data-route="/saved" data-nav-link class="nav__link">Saved</a>
            </li>
            <li class="nav__item">
              <a href="/digest" data-route="/digest" data-nav-link class="nav__link">Digest</a>
            </li>
            <li class="nav__item">
              <a href="/settings" data-route="/settings" data-nav-link class="nav__link">Settings</a>
            </li>
            <li class="nav__item">
              <a href="/proof" data-route="/proof" data-nav-link class="nav__link">Proof</a>
            </li>
          </ul>
        </nav>
      </header>

      <main class="page-main">
        <section class="context-header">
          <div class="text-max-width stack-vertical">
            <h1 class="heading-xl context-header__headline" data-route-heading></h1>
            <p class="body-large text-muted context-header__subtext" data-route-subtext></p>
          </div>
        </section>
      </main>

      <footer class="proof-footer">
        <h2 class="proof-footer__title">Proof checklist</h2>
        <ul class="proof-footer__checklist">
          <li>
            <span class="checkbox">
              <span class="checkbox__box"></span>
              <span class="checkbox__label">UI Built</span>
            </span>
          </li>
          <li>
            <span class="checkbox">
              <span class="checkbox__box"></span>
              <span class="checkbox__label">Logic Working</span>
            </span>
          </li>
          <li>
            <span class="checkbox">
              <span class="checkbox__box"></span>
              <span class="checkbox__label">Test Passed</span>
            </span>
          </li>
          <li>
            <span class="checkbox">
              <span class="checkbox__box"></span>
              <span class="checkbox__label">Deployed</span>
            </span>
          </li>
        </ul>
      </footer>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
